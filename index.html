<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header>
      <h1>💰 Controle de Gastos</h1>
      <p>Gerencie suas finanças</p>
    </header>

    <section class="card total-card">
      <h2>Total gasto</h2>
      <span id="total">R$ 0,00</span>
    </section>

    <section class="card form-card">
      <h2>Novo gasto</h2>

      <form id="form-gasto">
        <input type="text" id="nome" placeholder="Descrição" required>
        <input type="number" id="valor" placeholder="Valor" required>

        <select id="categoria">
          <option>🍔 Alimentação</option>
          <option>🚗 Transporte</option>
          <option>🎮 Lazer</option>
          <option>📦 Outros</option>
        </select>

        <input type="date" id="data" required>

        <button type="submit">Adicionar gasto</button>
      </form>
    </section>

    <section class="card lista-card">
      <h2>Histórico</h2>
      <ul id="lista-gastos"></ul>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>

  <section class="card renda-card">
    <h2>Renda mensal</h2>
    
    <input type="number" id="renda" placeholder="Digite sua renda">
    <button onclick="salvarRenda()">Salvar renda</button>
  </section>
  
  <section class="card total-card">
    <h2>Saldo</h2>
    <span id="saldo">R$ 0,00</span>
  </section>
</body>

<section class="card">
    <h2>Gastos por categoria</h2>
    <canvas id="grafico"></canvas>
</section>

</html>
